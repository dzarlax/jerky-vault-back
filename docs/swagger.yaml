basePath: /
definitions:
  controllers.ChangePasswordRequest:
    properties:
      currentPassword:
        type: string
      newPassword:
        type: string
    type: object
  controllers.DashboardData:
    properties:
      order_type_distribution:
        items:
          $ref: '#/definitions/controllers.OrderTypeDistribution'
        type: array
      pending_orders:
        type: integer
      recent_orders:
        items:
          $ref: '#/definitions/controllers.RecentOrder'
        type: array
      total_orders:
        type: integer
      total_products:
        type: integer
      total_recipes:
        type: integer
    type: object
  controllers.LoginPayload:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  controllers.OrderTypeDistribution:
    properties:
      count:
        type: integer
      type:
        type: string
    type: object
  controllers.ProfitData:
    properties:
      order_count:
        type: integer
      total_costs:
        type: number
      total_profit:
        type: number
      total_revenue:
        type: number
    type: object
  controllers.RecentOrder:
    properties:
      client_name:
        type: string
      id:
        type: integer
      order_date:
        type: string
      status:
        type: string
      total_amount:
        type: number
    type: object
  controllers.RegisterPayload:
    properties:
      password:
        minLength: 8
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.Client:
    properties:
      address:
        type: string
      created_at:
        type: string
      id:
        type: integer
      instagram:
        type: string
      name:
        minLength: 1
        type: string
      orders:
        items:
          $ref: '#/definitions/models.Order'
        type: array
      phone:
        type: string
      source:
        type: string
      surname:
        minLength: 1
        type: string
      telegram:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    required:
    - name
    - surname
    type: object
  models.ClientCreateDTO:
    properties:
      address:
        type: string
      instagram:
        type: string
      name:
        minLength: 1
        type: string
      phone:
        type: string
      source:
        type: string
      surname:
        minLength: 1
        type: string
      telegram:
        type: string
    required:
    - name
    - surname
    type: object
  models.ClientUpdateDTO:
    properties:
      address:
        type: string
      instagram:
        type: string
      name:
        minLength: 1
        type: string
      phone:
        type: string
      source:
        type: string
      surname:
        minLength: 1
        type: string
      telegram:
        type: string
    required:
    - name
    - surname
    type: object
  models.CookingSession:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      ingredients:
        items:
          $ref: '#/definitions/models.CookingSessionIngredient'
        type: array
      recipe:
        $ref: '#/definitions/models.Recipe'
      recipe_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
      yield:
        minLength: 1
        type: string
    required:
    - date
    - recipe_id
    - yield
    type: object
  models.CookingSessionCreateDTO:
    properties:
      date:
        type: string
      recipe_id:
        type: integer
      yield:
        minLength: 1
        type: string
    required:
    - date
    - recipe_id
    - yield
    type: object
  models.CookingSessionIngredient:
    properties:
      cooking_session:
        $ref: '#/definitions/models.CookingSession'
      cooking_session_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      ingredient:
        $ref: '#/definitions/models.Ingredient'
      ingredient_id:
        type: integer
      price:
        type: number
      quantity:
        type: string
      unit:
        type: string
      updated_at:
        type: string
    type: object
  models.Ingredient:
    properties:
      cooking_session_ingredients:
        items:
          $ref: '#/definitions/models.CookingSessionIngredient'
        type: array
      created_at:
        type: string
      id:
        type: integer
      name:
        minLength: 1
        type: string
      prices:
        items:
          $ref: '#/definitions/models.Price'
        type: array
      recipe_ingredients:
        items:
          $ref: '#/definitions/models.RecipeIngredient'
        type: array
      type:
        minLength: 1
        type: string
      updated_at:
        type: string
    required:
    - name
    - type
    type: object
  models.Order:
    properties:
      client:
        $ref: '#/definitions/models.Client'
      client_id:
        type: integer
      comment:
        type: string
      created_at:
        type: string
      id:
        type: integer
      items:
        items:
          $ref: '#/definitions/models.OrderItem'
        type: array
      status:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.OrderItem:
    properties:
      cost_price:
        type: number
      created_at:
        type: string
      id:
        type: integer
      order:
        $ref: '#/definitions/models.Order'
      order_id:
        type: integer
      price:
        type: number
      product:
        $ref: '#/definitions/models.Product'
      product_id:
        type: integer
      quantity:
        type: integer
      updated_at:
        type: string
    type: object
  models.Package:
    properties:
      created_at:
        type: string
      id:
        type: integer
      name:
        minLength: 1
        type: string
      products:
        description: If Package is related to Product through PackageID
        items:
          $ref: '#/definitions/models.Product'
        type: array
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    required:
    - name
    type: object
  models.PackageCreateDTO:
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  models.Price:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: integer
      ingredient:
        $ref: '#/definitions/models.Ingredient'
      ingredient_id:
        type: integer
      price:
        minimum: 0
        type: number
      quantity:
        minimum: 1
        type: integer
      unit:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    required:
    - date
    - ingredient_id
    - price
    type: object
  models.PriceCreateDTO:
    properties:
      date:
        type: string
      ingredient_id:
        type: integer
      price:
        minimum: 0
        type: number
      quantity:
        minimum: 1
        type: integer
      unit:
        type: string
    required:
    - ingredient_id
    - price
    type: object
  models.Product:
    properties:
      cost:
        minimum: 0
        type: number
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      image:
        type: string
      name:
        minLength: 1
        type: string
      options:
        items:
          $ref: '#/definitions/models.ProductOption'
        type: array
      package:
        allOf:
        - $ref: '#/definitions/models.Package'
        description: Add this field if you need to load package data
      package_id:
        description: Add this field
        type: integer
      price:
        minimum: 0
        type: number
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    required:
    - name
    - price
    type: object
  models.ProductOption:
    properties:
      created_at:
        type: string
      id:
        type: integer
      product:
        $ref: '#/definitions/models.Product'
      product_id:
        type: integer
      recipe:
        $ref: '#/definitions/models.Recipe'
      recipe_id:
        type: integer
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.ProductRequest:
    properties:
      options:
        items:
          $ref: '#/definitions/models.ProductOption'
        type: array
      product:
        $ref: '#/definitions/models.Product'
    type: object
  models.Recipe:
    properties:
      cooking_sessions:
        items:
          $ref: '#/definitions/models.CookingSession'
        type: array
      created_at:
        type: string
      id:
        type: integer
      name:
        minLength: 1
        type: string
      product_options:
        items:
          $ref: '#/definitions/models.ProductOption'
        type: array
      recipe_ingredients:
        items:
          $ref: '#/definitions/models.RecipeIngredient'
        type: array
      total_cost:
        description: Field not persisted to database
        type: number
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    required:
    - name
    type: object
  models.RecipeCreateDTO:
    properties:
      name:
        minLength: 1
        type: string
    required:
    - name
    type: object
  models.RecipeIngredient:
    properties:
      calculated_cost:
        description: Field not persisted to database
        type: number
      created_at:
        type: string
      id:
        type: integer
      ingredient:
        $ref: '#/definitions/models.Ingredient'
      ingredient_id:
        type: integer
      quantity:
        type: string
      recipe:
        $ref: '#/definitions/models.Recipe'
      recipe_id:
        type: integer
      unit:
        type: string
      updated_at:
        type: string
    type: object
  models.RecipeIngredientCreateDTO:
    properties:
      ingredient_id:
        type: integer
      quantity:
        type: string
      unit:
        type: string
    required:
    - ingredient_id
    - quantity
    type: object
  models.User:
    properties:
      clients:
        items:
          $ref: '#/definitions/models.Client'
        type: array
      created_at:
        type: string
      id:
        type: integer
      orders:
        items:
          $ref: '#/definitions/models.Order'
        type: array
      packages:
        items:
          $ref: '#/definitions/models.Package'
        type: array
      prices:
        items:
          $ref: '#/definitions/models.Price'
        type: array
      products:
        items:
          $ref: '#/definitions/models.Product'
        type: array
      recipes:
        items:
          $ref: '#/definitions/models.Recipe'
        type: array
      updated_at:
        type: string
      username:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: BatchVault API for small food production management
  title: BatchVault Backend API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT token
      parameters:
      - description: User credentials
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/controllers.LoginPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login a user
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user with a username and password
      parameters:
      - description: User data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/controllers.RegisterPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.User'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - Auth
  /api/clients:
    get:
      description: Get all clients for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Client'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get list of clients
      tags:
      - Clients
    post:
      consumes:
      - application/json
      description: Create a new client for the authenticated user
      parameters:
      - description: Client data
        in: body
        name: client
        required: true
        schema:
          $ref: '#/definitions/models.ClientCreateDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Client'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add a new client
      tags:
      - Clients
  /api/clients/{id}:
    delete:
      description: Delete a client by its ID
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: Client deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid client ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Client not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a client
      tags:
      - Clients
    get:
      description: Fetch a client by its ID
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Client'
        "400":
          description: Invalid client ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Client not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a client by ID
      tags:
      - Clients
    put:
      consumes:
      - application/json
      description: Update a client's details
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      - description: Client data
        in: body
        name: client
        required: true
        schema:
          $ref: '#/definitions/models.ClientUpdateDTO'
      produces:
      - application/json
      responses:
        "200":
          description: Client updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid client ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Client not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a client
      tags:
      - Clients
  /api/cooking_sessions:
    get:
      description: Get all cooking sessions available for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.CookingSession'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get list of cooking sessions
      tags:
      - Cooking Sessions
    post:
      consumes:
      - application/json
      description: Create a new cooking session with details
      parameters:
      - description: Cooking Session data
        in: body
        name: session
        required: true
        schema:
          $ref: '#/definitions/models.CookingSessionCreateDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.CookingSession'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new cooking session
      tags:
      - Cooking Sessions
  /api/dashboard:
    get:
      description: Fetch statistics for the dashboard
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.DashboardData'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get dashboard data
      tags:
      - Dashboard
  /api/dashboard/profit:
    get:
      description: Fetch profit statistics for completed orders
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controllers.ProfitData'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get profit data
      tags:
      - Dashboard
  /api/ingredients:
    get:
      description: Get all ingredients
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Ingredient'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get list of ingredients
      tags:
      - Ingredients
    post:
      consumes:
      - application/json
      description: Create a new ingredient with type and name
      parameters:
      - description: Ingredient data
        in: body
        name: ingredient
        required: true
        schema:
          $ref: '#/definitions/models.Ingredient'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Ingredient'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Ingredient already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new ingredient
      tags:
      - Ingredients
  /api/ingredients/check:
    get:
      description: Check if an ingredient with the given name already exists
      parameters:
      - description: Ingredient name to check
        in: query
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Check result
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Check if ingredient exists
      tags:
      - Ingredients
  /api/orders:
    get:
      description: Get all orders for the authenticated user, sorted by creation date
        (newest first)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Order'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get list of orders
      tags:
      - Orders
    post:
      consumes:
      - application/json
      description: Create a new order for the authenticated user
      parameters:
      - description: Order data
        in: body
        name: order
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Order'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add a new order
      tags:
      - Orders
  /api/orders/{id}:
    delete:
      description: Delete an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "200":
          description: Order deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid order ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Order not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an order
      tags:
      - Orders
    get:
      description: Fetch an order by its ID
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Order'
        "400":
          description: Invalid order ID
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
